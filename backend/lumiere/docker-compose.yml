version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg15
    container_name: lumiere_db
    environment:
      POSTGRES_DB: lumiere
      POSTGRES_USER: lumiere_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiere_user"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # Redis (Cache & Celery Broker)
  redis:
    image: redis:7-alpine
    container_name: lumiere_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  
  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumiere_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 lumiere.asgi:application"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://lumiere_user:${DB_PASSWORD:-changeme}@db:5432/lumiere
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=lumiere.settings
  
  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumiere_celery_worker
    command: celery -A lumiere worker -l info --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    environment:
      - DATABASE_URL=postgresql://lumiere_user:${DB_PASSWORD:-changeme}@db:5432/lumiere
      - REDIS_URL=redis://redis:6379/0
  
  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumiere_celery_beat
    command: celery -A lumiere beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - backend
    environment:
      - DATABASE_URL=postgresql://lumiere_user:${DB_PASSWORD:-changeme}@db:5432/lumiere
      - REDIS_URL=redis://redis:6379/0
  
  # Nginx (Production)
  nginx:
    image: nginx:alpine
    container_name: lumiere_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
    depends_on:
      - backend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: